name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm test
      - name: Build smoke
        run: npm run build
      - name: CLI smoke
        run: npm run smoke
